name: Fetch Episodes

on:
  schedule:
    - cron: '0 14 * * *' # Every day at 8am CST (14:00 UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch episodes from RSS
        run: node scripts/fetch-episodes.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/episodes.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/episodes.json
          git commit -m "update: fetch latest episodes from RSS"
          git push
